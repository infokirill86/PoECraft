rules:
  greater:
    input_rarity:
    - magic
    output_rarity: rare
    retain_existing_modifiers: true
    remove_count: 0
    add_count: 1
    prevalidate:
    - family_absent
    - crafted_capacity_free
    - result_side_capacity_free
  perfect:
    input_rarity:
    - rare
    output_rarity: rare
    remove_count: 1
    add_count: 1
    prevalidate:
    - family_absent
    - crafted_capacity_free
    - filtered_removal_pool_nonempty
    sequence:
    - validate_all
    - remove
    - rebuild_state
    - add_guaranteed_crafted_mod
identity_contract:
  perfect_essence_families_are_distinct_from_ordinary_families: true
  perfect_essence_outputs_are_terminal_neutral: true
  perfect_essence_outputs_consume_affix_slot: true
  all_essence_outputs_consume_crafted_capacity: true
  conflict_rule: family_id or intersecting group_ids
  crafted_single_tier_essence_tier: 1
