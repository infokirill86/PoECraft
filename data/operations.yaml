    output_rarity: same
    remove:
      kind: uniform_installed_instance
      count: 1
      exclude_flags:
      - fractured
      omen_filters:
      - side_filter
      - desecrated_only
    add:
      kind: none
    preconditions:
    - type: filtered_removal_pool_nonempty
      filters:
      - exclude fractured
      - apply side Omen
      - apply desecrated-only Omen
    on_empty_removal_pool: NO_TRANSITION_NO_CONSUMPTION
  active_in_current_simulation: true
  runtime_admission_status: accepted_executable_runtime
