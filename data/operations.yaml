    output_rarity: rare
    preconditions:
    - type: occupied_explicit_slots
      operator: '>='
      value: 4
    - type: fractured_modifier_count
      operator: ==
      value: 0
    target:
      kind: uniform_installed_instance
      exclude_flags:
      - fractured
      exclude_instance_kinds:
      - unrevealed_desecrated_placeholder
    mutation:
      set_flag:
        fractured: true
    preserve_flags:
    - crafted
    - desecrated
    revealed_desecrated_target_rule:
      status: DISPUTED_AND_OUT_OF_ACTIVE_SCOPE
      craft_of_exile_emulator_observation: eligible target
      external_documentation_claim: ineligible target
      in_game_verification: not performed
      runtime_behavior_for_current_simulation: operation disabled; rule cannot affect active probabilities
  active_in_current_simulation: false
  runtime_admission_status: disputed_or_requires_user_resolution
