    - add
    - commit
    remove:
      kind: uniform_installed_instance
      count: 1
      exclude_flags:
      - fractured
      omen_filters:
      - side_filter
      - minimum_modifier_level_selection
    add:
      kind: ordinary_weighted
      count: 1
      mml: null
    preconditions:
    - type: filtered_removal_pool_nonempty
      filters:
      - exclude fractured
      - apply side Omen
      - apply Whittling selection if active
    - type: post_removal_add_pool_nonempty
      rule: rebuild ordinary add pool on the branch-copy after removal
    on_failed_precondition: NO_TRANSITION_NO_CONSUMPTION
  active_in_current_simulation: true
  runtime_admission_status: accepted_executable_runtime
