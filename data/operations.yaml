      operator: ==
      value: false
    - type: free_augment_sockets
      operator: '>='
      value: 1
    mutation:
      astrid_installed: true
      augment_socket_used_delta: 1
    derived_effect:
      crafted_modifier_limit_delta: 1
      base_limit: 1
      resulting_limit: 2
    failure_atomicity: No augment socket is consumed if Astrid is already installed or no free augment socket exists.
  active_in_current_simulation: true
  runtime_admission_status: admission_candidate
