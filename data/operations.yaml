schema_version: 2
item_class: quarterstaff
handler_declarations:
  transmutation: catalog_single_add_handler
  augmentation: catalog_single_add_handler
  regal: catalog_single_add_handler
  exalted: exalted_handler
  annulment: annulment_handler
  chaos: chaos_handler
  support_augment: support_augment_handler
  perfect_essence: perfect_essence_handler
  jawbone: jawbone_handler
  reveal: reveal_handler
global_contracts:
  composite_operations_are_atomic: true
  invalid_actions_generate_no_transition: true
  ordinary_add_pool_rebuilt_before_each_elementary_add: true
  fractured_modifiers_are_never_removable_or_mutable: true
  ordinary_add_pool_pipeline:
    ordered_steps:
    - select pool-build rarity and item class
    - apply explicit side_filter from the legal Omen bundle, if present
    - remove sides without sufficient remaining capacity for the complete requested add count
    - block every installed family_id
    - block every candidate whose group_ids intersect installed group_ids
    - apply MML inside each remaining family using the adopted family fallback policy
    - remove non-positive-weight rows
    - weighted-sample one tier row
    - after each sequential draw, block the selected family and conflicting groups before rebuilding the next draw pool
    block_installed_families: true
    block_installed_groups: true
    respect_rarity_side_capacities: true
    draw_unit: tier_row
  modified_operation_prevalidation: Compile currency plus the complete legal Omen bundle first. Validate the fully modified
    operation before consuming any component or mutating the item.
  partial_multi_add_forbidden: true
  failed_precondition_consumes_nothing: true
operations:
- operation_id: transmutation
  group: transmutation
  input_rarity:
  - normal
  cost_resource_id: transmutation
  transition:
    atomic: true
    output_rarity: magic
    remove:
      kind: none
    add:
      kind: ordinary_weighted
      count: 1
      side_filter: null
      mml: null
  active_in_current_simulation: true
  runtime_admission_status: accepted_executable_runtime
- operation_id: greater_transmutation
  group: transmutation
  input_rarity:
  - normal
  cost_resource_id: greater_transmutation
  transition:
    atomic: true
    output_rarity: magic
    remove:
      kind: none
    add:
      kind: ordinary_weighted
      count: 1
      side_filter: null
      mml: 44
  active_in_current_simulation: true
  runtime_admission_status: accepted_executable_runtime
- operation_id: perfect_transmutation
  group: transmutation
  input_rarity:
  - normal
  cost_resource_id: perfect_transmutation
  transition:
    atomic: true
    output_rarity: magic
    remove:
      kind: none
    add:
      kind: ordinary_weighted
      count: 1
      side_filter: null
      mml: 70
