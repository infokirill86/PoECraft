      - 1
      - 2
    preconditions:
    - type: free_explicit_slots_after_side_filter
      operator: '>='
      value: resolved_add_count
    omen_resolution:
      greater_exaltation:
        resolved_add_count: 2
        requires_two_free_legal_slots: true
        partial_execution: false
        on_insufficient_slots: NO_TRANSITION_NO_CONSUMPTION
      sinistral_or_dextral_exaltation:
        side_filter_applies_before_capacity_check: true
