    install:
      kind: unrevealed_desecrated_placeholder
      stored_context:
      - side
      - jawbone_id
      - reveal_mml
      - lich_tag_constraint
    legal_side_definition:
      free_side: current side count is below side capacity
      replaceable_full_side: current side count equals side capacity and at least one installed instance on that side is removable
        after excluding fractured instances
    failure_atomicity: Jawbone and all paired Omens remain unconsumed when no legal transition exists.
    prevalidate:
    - item is Rare
