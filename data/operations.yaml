- operation_id: reveal_desecrated
  group: reveal
  input_rarity:
  - rare
  cost_resource_id: reveal_desecrated
  transition:
    atomic: true
    output_rarity: rare
    preconditions:
    - type: unrevealed_desecrated_count
      operator: ==
      value: 1
    pool:
      sources:
      - ordinary_quarterstaff
      - exclusive_desecrated_quarterstaff
      side: placeholder.side
      mml: placeholder.reveal_mml
      block_installed_families_and_groups: true
    offers:
      count: 3
      unit_of_sampling: eligible_tier_row
      algorithm: sequential_probability_proportional_to_weight_without_replacement
      steps:
      - Build the eligible tier-row pool from ordinary and exclusive Desecrated sources.
      - Apply fixed side, item/base eligibility, installed family/group blocking, and Jawbone MML.
      - Apply Lich guarantee-one when a stored Lich tag constraint exists: draw exactly one compatible tagged offer if possible.
      - After each selected row, remove every remaining row sharing a blocked family or exclusive group with the selected
        row.
      - Fill the remaining offer slots sequentially from the remaining pool, each time proportional to current row weight.
      - Randomly permute the final three displayed positions; display order has no mechanical meaning.
      distinctness:
        same_mod_id: false
        same_family_id: false
        conflicting_group_ids: false
      insufficient_pool_behavior:
        condition: fewer than three mutually compatible eligible outcomes after all constraints
        result: CRAFTING_FAILED_COULD_NOT_GENERATE_MOD
      lich_guarantee:
        mode: guarantee_one
        selected_model: Option A
        source_label: PROJECT_POLICY / source-aligned project model
        algorithm:
        - Build compatible eligible outcomes carrying the stored Lich tag through the M5 Reveal pool with required_tag.
        - If no compatible tagged outcome exists, return CRAFTING_FAILED without consumption.
        - Draw exactly one tagged offer through M4 choose_one.
        - Block the guaranteed offer family/groups and fill the remaining two offer slots from the general eligible pool.
        guaranteed_tagged_offers: 1
        remaining_general_offers: 2
        persists_through_abyssal_echoes_reroll: true
      verification_status: PROJECT_POLICY_SOURCE_ALIGNED_MODEL
      verification_basis:
      - Current Omen wording guarantees a random modifier of the named Lich.
      - M7h project decision adopts guarantee-one as the source-aligned model.
      - Exact server probability remains deferred pending in-game/source verification.
    decision:
      kind: policy_choice_after_observation
      initial_set_actions:
      - CHOOSE_ONE_OF_THREE
      - REROLL_IF_ABYSSAL_ECHOES_AVAILABLE
      reroll:
        maximum: 1
        generation: independent_complete_set_from_same_pre_reveal_state
        first_set_discarded: true
        second_set_action: CHOOSE_ONE_OF_THREE
    commit:
      replace_placeholder: true
      set_flags:
        desecrated: true
  active_in_current_simulation: true
  runtime_admission_status: blocked_or_out_of_scope
