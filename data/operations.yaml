  runtime_admission_status: accepted_executable_runtime
- operation_id: augmentation
  group: augmentation
  input_rarity:
  - magic
  cost_resource_id: augmentation
  transition:
    atomic: true
    output_rarity: magic
    preconditions:
    - type: occupied_explicit_slots
      operator: <
      value: 2
    remove:
      kind: none
    add:
      kind: ordinary_weighted
      count: 1
      side_filter: null
      mml: null
      side_resolution: On Magic items, only a side below its 1-mod capacity is eligible. If one prefix is installed, the addition
        must be a suffix; if one suffix is installed, it must be a prefix.
  active_in_current_simulation: true
  runtime_admission_status: accepted_executable_runtime
