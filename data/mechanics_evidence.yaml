schema_version: 1
mml:
  policy: family_internal_threshold_with_strongest_family_fallback
  runtime_status: USER_APPROVED_PROJECT_RULE
  evidence_level: supported_empirically_server_unconfirmed
  applies_uniformly_to:
  - greater/perfect transmutation
  - greater/perfect augmentation
  - greater/perfect regal
  - greater/perfect exalted
  - greater/perfect chaos addition
  - Ancient Jawbone reveal
  sampling_granularity:
    chosen_model: tier_row_after_family_internal_MML_filter
    status: USER_APPROVED_RUNTIME_MODEL
  accepted_runtime_thresholds:
    runtime_status: USER_APPROVED_PROJECT_RULE
    evidence_level: project_model_source_open
    broader_mml_closure: false
    server_truth_claimed: false
    exact_threshold_source_refs:
    - poe2db_currency
    corroborating_context_source_refs:
    - official_patch_0_5
    - official_patch_0_3
    source_note: PoE2DB Currency lists the specific thresholds. Official patch 0.3.0 confirms the Greater/Perfect introduction and minimum-level concept; later official patch context is corroborating only. Neither is treated as server-truth closure.
    values:
      greater_transmutation:
        add_pool_mml: 44
        application_stage: target_magic_add_pool
      perfect_transmutation:
        add_pool_mml: 70
        application_stage: target_magic_add_pool
      greater_augmentation:
        add_pool_mml: 44
        application_stage: magic_add_pool
      perfect_augmentation:
        add_pool_mml: 70
        application_stage: magic_add_pool
      greater_regal:
        add_pool_mml: 35
        application_stage: target_rare_add_pool
      perfect_regal:
        add_pool_mml: 50
        application_stage: target_rare_add_pool
      greater_exalted:
        add_pool_mml: 35
        application_stage: rare_add_pool
      perfect_exalted:
        add_pool_mml: 50
        application_stage: rare_add_pool
      greater_chaos:
        add_pool_mml: 35
        application_stage: rebuilt_post_removal_add_pool
      perfect_chaos:
        add_pool_mml: 50
        application_stage: rebuilt_post_removal_add_pool
rarity_capacity_and_mutable_modifier_count:
  runtime_status: USER_AUTHORIZED_M40A_PROJECT_MODEL
  evidence_level: project_model_source_open
  server_truth_claimed: false
  source_refs:
  - poe2db_currency
  - official_patch_0_3
  capacity:
    normal:
      prefix: 0
      suffix: 0
    magic:
      prefix: 1
      suffix: 1
    rare:
      prefix: 3
      suffix: 3
  current_modifier_count:
    rule: mutable_state_from_zero_through_rarity_capacity
    magic_zero_after_removal_supported: true
    rare_below_generated_count_supported: true
  fractured_modifiers:
    consume_corresponding_side_capacity: true
    protected_from_excluding_removal_operations: true
    current_fractured_critical_suffix_staff_is_supported_scenario_not_global_invariant: true
  augmentation:
    opposite_side_behavior: derived_from_magic_side_capacity_and_combined_legal_pool
    separate_side_lottery: false
  rarity_transition_add:
    transmutation_pool_build_rarity: magic
    regal_pool_build_rarity: rare
    commit: target_rarity_and_added_modifier_atomic
    failure: no_transition_no_consumption_original_state_unchanged
whittling:
  official_rule: remove the lowest modifier-level removable modifier
  tie_breaker: uniform_random_among_tied_lowest_level_instances
  status: USER_PLAYER_CONFIRMED_PROJECT_MODEL
  server_truth_claimed: false
  evidence_level: official wording confirms lowest level; tie behavior is player-confirmed, not server-published
  tie_breaker_evidence: In-game confirmed by user 2026-07-11 (2 tests). When two removable modifiers share the lowest modifier level, both are shown as removable candidates in the preview but exactly one is removed at random. This matches the existing uniform-among-tied-lowest project model; the selection rule is unchanged.
lich_guarantee_one:
  runtime_status: USER_APPROVED_PROJECT_RULE
  source_label: PROJECT_POLICY / source-aligned project model
  selected_model: Option A guarantee-one
  behavior:
    guarantee: each constrained OfferSet draws one compatible tagged offer if possible
    remaining_offers: general Reveal pool with the guaranteed offer family/groups blocked
    no_compatible_tagged_candidate: CRAFTING_FAILED
    persists_through_abyssal_echoes_reroll: true
  verification_todo: Re-check in game before exact probability treats the Lich model as final server truth.
